<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Lab Lockdown: Organic Chemistry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>

    <main class="game-shell" id="introScreen">
        <section class="story-card" style="text-align: center;">
            <h1 class="neon-text">🧪 The Mad Lab</h1>
            <p>Dr. Beaker has locked the facility! Correctly identify the chemical reagents to escape.</p>
            <div class="input-group">
                <input type="text" id="playerNameInput" placeholder="Enter Scientist Name">
            </div>
            <button id="startBtn" class="next-btn" style="margin-top: 20px;">Put on Goggles & Enter 🥽</button>
        </section>
    </main>

    <main class="game-shell hidden" id="gameBoard">
        <header class="top-bar">
            <div>
                <h1 class="neon-text-small">🔐 Area Secured</h1>
                <p class="subtitle" id="roomTitle"></p>
            </div>
            <div class="stats-container">
                <div class="progress-card"><span>Door</span><strong id="progressText">1 / 6</strong></div>
                <div class="stats-container">
                    <div class="progress-card"><span>Score</span><strong id="scoreText">0</strong></div>
                </div>
            </div>
        </header>

        <section class="story-card">
            <h2 style="color: #7df9ff;">🔬 Observation Log</h2>
            <p id="observation" style="font-style: italic; color: #bdfaff; background: rgba(0,212,255,0.1); padding: 10px; border-radius: 5px;"></p>
            <p class="question" id="question" style="font-size: 1.2rem; font-weight: bold; margin-top: 15px;"></p>
        </section>

        <section class="tube-rack" id="answers"></section>

        <section class="result-card hidden" id="resultCard">
            <h3 id="resultTitle"></h3>
            <p id="resultMessage"></p>
        </section>
    </main>

    <main class="game-shell hidden" id="finalScreen">
        <section class="story-card center-text" style="border: 3px solid #00ffa6; text-align: center;">
            <h1 class="neon-text">Mission Complete!</h1>
            <h2 id="finalGrade" style="margin: 20px 0; color: #00ffa6;"></h2>
            <p id="finalScoreDisplay" style="font-size: 1.8rem; font-family: monospace; font-weight: bold;"></p>
            <p id="finalNameDisplay" style="margin-bottom: 25px; opacity: 0.8; font-size: 1rem;"></p>
            
            <div style="background: rgba(0, 255, 166, 0.1); padding: 15px; border-radius: 10px; border: 2px dashed #00ffa6; margin-bottom: 30px;">
                <p style="color: #00ffa6; font-weight: bold; margin: 0; font-size: 1.1rem;">
                    📸 Please screenshot and submit in google form TQ!
                </p>
            </div>

            <button onclick="location.reload()" class="next-btn">Reboot System 🔁</button>
        </section>
    </main>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
