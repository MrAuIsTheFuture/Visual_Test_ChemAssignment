<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Test for Organic Compound</title>
<style>
body { font-family: 'Courier New', Courier, monospace; background:#1a1a2e; margin:0; padding:20px; color:#e1e1e1; }
.container { max-width: 800px; margin:auto; background:#16213e; padding:30px; border-radius:15px; border: 2px solid #0f3460; box-shadow:0 0 20px rgba(0,255,255,0.2); }
h1 { color:#4cc9f0; text-align: center; text-transform: uppercase; letter-spacing: 2px; }

/* The Test Tube Visual */
#lab-bench { display: flex; justify-content: center; margin: 20px 0; }
.test-tube {
    width: 60px; height: 180px; 
    border: 3px solid #ccc; 
    border-radius: 0 0 30px 30px; 
    background: rgba(255,255,255,0.1);
    position: relative; overflow: hidden;
}
.liquid {
    position: absolute; bottom: 0; width: 100%; height: 70%;
    background: #555; transition: background 1s, height 0.5s;
}

/* Game Elements */
button { background:#4361ee; color:white; border:none; padding:12px 20px; border-radius:4px; cursor:pointer; font-weight: bold; }
button:hover { background:#4cc9f0; transform: scale(1.02); }
.option { display:block; width: 100%; margin:10px 0; background:#0f3460; text-align: left; border: 1px solid #4361ee; }
.hidden { display:none; }
.correct { background:#4caf50 !important; }
.wrong { background:#e91e63 !important; }
.theory { background:#1b262c; border-left:4px solid #4cc9f0; padding:15px; margin-top:20px; font-style: italic; color: #94d2bd; }
<style>
</head>
<body>
<div class="container">
  <h1>Visual Test for Organic Compound</h1>
  <p>Pre-University Chemistry Quiz (5–7 random questions)</p>

  <div id="startScreen">
    <label><strong>Enter Your Name:</strong></label>
    <input type="text" id="playerName" placeholder="Your name">
    <button onclick="startGame()">Start Game</button>
  </div>

  <div id="quizScreen" class="hidden">
    <p><strong>Player:</strong> <span id="displayName"></span></p>
    <p><strong>Question <span id="qNum"></span> of <span id="qTotal"></span></strong></p>
    <h3 id="questionText"></h3>
    <div id="options"></div>
    <div id="feedback"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Next Question</button>
  </div>

  <div id="endScreen" class="hidden">
    <h2>Game Complete!</h2>
    <p id="finalScore"></p>
    <h3>Leaderboard</h3>
    <ol id="leaderboard"></ol>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
const QUESTION_BANK = [
  {
    q: "What happens when bromine water is added to an alkene at room temperature?",
    options: ["Orange to colourless", "Blue to red", "Purple to green", "No change"],
    answer: 0,
    theory: "Alkenes contain a C=C double bond that reacts rapidly with bromine water, decolourising the orange solution."
  },
  {
    q: "What is the positive observation in Tollens' test for an aldehyde?",
    options: ["Blue precipitate", "Silver mirror", "Effervescence", "Purple solution"],
    answer: 1,
    theory: "Aldehydes reduce Tollens' reagent, depositing metallic silver on the test tube wall."
  },
  {
    q: "Which reagent gives an orange precipitate with aldehydes and ketones?",
    options: ["2,4-DNPH", "Bromine water", "Sodium bicarbonate", "Ferric chloride"],
    answer: 0,
    theory: "2,4-Dinitrophenylhydrazine reacts with carbonyl compounds to form an orange precipitate."
  },
  {
    q: "What observation occurs when sodium bicarbonate is added to a carboxylic acid?",
    options: ["Silver mirror", "Effervescence of CO₂", "Purple colour", "Orange precipitate"],
    answer: 1,
    theory: "Carboxylic acids react with bicarbonate to release carbon dioxide gas, causing bubbling."
  },
  {
    q: "What colour appears when ferric chloride is added to phenol?",
    options: ["Purple/violet", "Brick-red", "Colourless", "Black"],
    answer: 0,
    theory: "Phenol forms a coloured complex with Fe³⁺ ions, commonly producing a violet solution."
  },
  {
    q: "What condition is typically used to oxidise ethanol to ethanoic acid?",
    options: ["Acidified potassium dichromate and heat under reflux", "UV light only", "Ice bath", "No reagent"],
    answer: 0,
    theory: "Primary alcohols are oxidised by acidified potassium dichromate(VI) under reflux to carboxylic acids."
  },
  {
    q: "What colour change is seen when acidified potassium dichromate oxidises an alcohol?",
    options: ["Orange to green", "Blue to red", "Purple to yellow", "No change"],
    answer: 0,
    theory: "Cr₂O₇²⁻ (orange) is reduced to Cr³⁺ (green) during oxidation."
  },
  {
    q: "Which compound gives a positive Tollens' test but also forms an orange precipitate with 2,4-DNPH?",
    options: ["Ketone", "Aldehyde", "Alkene", "Phenol"],
    answer: 1,
    theory: "Aldehydes contain a carbonyl group (positive 2,4-DNPH) and can be oxidised (positive Tollens')."
  },
  {
    q: "Which condition is required for the bromine water test for alkenes?",
    options: ["Room temperature, no catalyst", "Strong heating", "UV light", "Concentrated sulfuric acid"],
    answer: 0,
    theory: "The addition reaction occurs readily at room temperature without special conditions."
  },
  {
    q: "Which compound type does NOT react with 2,4-DNPH?",
    options: ["Aldehydes", "Ketones", "Alcohols", "Both aldehydes and ketones"],
    answer: 2,
    theory: "Alcohols lack the C=O carbonyl group required to react with 2,4-DNPH."
  }
];

let selectedQuestions = [];
let current = 0;
let score = 0;
let player = "";

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startGame() {
  player = document.getElementById('playerName').value.trim();
  if (!player) {
    alert("Please enter your name.");
    return;
  }

  const total = Math.floor(Math.random() * 3) + 5; // 5 to 7 questions
  selectedQuestions = shuffle(QUESTION_BANK).slice(0, total);
  current = 0;
  score = 0;

  document.getElementById('displayName').textContent = player;
  document.getElementById('qTotal').textContent = selectedQuestions.length;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');

  showQuestion();
}

function showQuestion() {
  const q = selectedQuestions[current];
  document.getElementById('qNum').textContent = current + 1;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('feedback').innerHTML = "";
  document.getElementById('nextBtn').classList.add('hidden');

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(idx, btn);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(choice, button) {
  const q = selectedQuestions[current];
  const buttons = document.querySelectorAll('.option');
  buttons.forEach(btn => btn.disabled = true);

  if (choice === q.answer) {
    score++;
    button.classList.add('correct');
  } else {
    button.classList.add('wrong');
    buttons[q.answer].classList.add('correct');
  }

  document.getElementById('feedback').innerHTML =
    `<div class="theory"><strong>Theory:</strong> ${q.theory}</div>`;
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion() {
  current++;
  if (current < selectedQuestions.length) {
    showQuestion();
  } else {
    endGame();
  }
}

function endGame() {
  saveScore();
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent =
    `${player}, you scored ${score} out of ${selectedQuestions.length}.`;
  renderLeaderboard();
}

function saveScore() {
  const board = JSON.parse(localStorage.getItem('organicLeaderboard') || '[]');
  board.push({
    name: player,
    score: score,
    total: selectedQuestions.length,
    percent: Math.round((score / selectedQuestions.length) * 100),
    date: new Date().toLocaleDateString()
  });

  board.sort((a, b) => b.percent - a.percent || b.score - a.score);
  localStorage.setItem('organicLeaderboard', JSON.stringify(board.slice(0, 10)));
}

function renderLeaderboard() {
  const board = JSON.parse(localStorage.getItem('organicLeaderboard') || '[]');
  const list = document.getElementById('leaderboard');
  list.innerHTML = '';

  if (board.length === 0) {
    list.innerHTML = '<li>No scores yet.</li>';
    return;
  }

  board.forEach(entry => {
    const li = document.createElement('li');
    li.textContent = `${entry.name} — ${entry.score}/${entry.total} (${entry.percent}%)`;
    list.appendChild(li);
  });
}

function restartGame() {
  document.getElementById('playerName').value = "";
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
}
</script>
</body>
</html>
