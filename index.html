<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemistry Escape Room</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-glow"></div>

  <main class="game-shell">
    <header class="top-bar">
      <div>
        <h1>🧪 Chemistry Escape Room</h1>
        <p class="subtitle">Room 1: The Unsaturated Door Lock</p>
      </div>
      <div class="progress-card">
        <span>Progress</span>
        <strong id="progressText">1 / 10</strong>
      </div>
    </header>

    <section class="story-card">
      <h2>🔬 Experiment Observation</h2>
      <p>
        Bromine water is added to an unknown organic compound at room temperature.
        The orange solution turns <strong>colourless</strong>.
      </p>
      <p class="question">
        Which type of compound is present?
      </p>
    </section>

    <section class="tube-rack" id="answers">
      <!-- Answer test tubes injected by JavaScript -->
    </section>

    <section class="result-card hidden" id="resultCard">
      <h3 id="resultTitle"></h3>
      <p id="resultMessage"></p>
      <button id="nextBtn" class="next-btn hidden">Unlock Next Room 🔓</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
