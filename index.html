<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Lab Lockdown: Mad Science Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>

    <main class="game-shell" id="introScreen">
        <section class="story-card center-text">
            <h1 class="neon-text">🧪 The Mad Lab</h1>
            <p class="description-text">Trapped in Dr. Beaker's abandoned laboratory! You must mix the correct reagents to override the security lockdown. One wrong move and the lab goes boom.</p>
            <div class="input-group">
                <label for="playerNameInput">Scientist Name:</label>
                <input type="text" id="playerNameInput" placeholder="e.g. Dr. Fizz" autocomplete="off">
            </div>
            <button id="startBtn" class="next-btn">Put on Goggles & Enter 🥽</button>
        </section>
    </main>

    <main class="game-shell hidden" id="gameBoard">
        <header class="top-bar">
            <div>
                <h1 class="neon-text-small">🔐 Area Secured</h1>
                <p class="subtitle" id="roomTitle"></p>
            </div>
            <div class="stats-container">
                <div class="progress-card"><span>Door</span><strong id="progressText">1 / 10</strong></div>
                <div class="progress-card"><span>Score</span><strong id="scoreText">0</strong></div>
            </div>
        </header>

        <section class="story-card main-content">
            <h2>🔬 Observation Log</h2>
            <div id="observation-container">
                <p id="observation"></p>
            </div>
            <p class="question" id="question"></p>
        </section>

        <section class="tube-rack" id="answers"></section>

        <section class="result-card hidden" id="resultCard">
            <h3 id="resultTitle"></h3>
            <p id="resultMessage"></p>
            <button id="nextBtn" class="next-btn hidden">Rush to Next Room 🏃💨</button>
        </section>
    </main>

    <main class="game-shell hidden" id="finalScreen">
        <section class="story-card center-text">
            <h1 class="neon-text">Simulation Survived!</h1>
            <h2 id="finalGrade" class="success-text"></h2>
            <p id="finalScoreDisplay" style="font-size: 1.8rem; margin-top: 20px;"></p>
            <p id="finalNameDisplay" style="color: #9fdfff; font-family: monospace;"></p>
            <button id="restartBtn" class="next-btn" style="margin-top: 30px;">Reboot System 🔁</button>
        </section>
    </main>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
