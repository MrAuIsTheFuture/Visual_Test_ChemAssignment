<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry Escape Room</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="background-glow"></div>

<main class="game-shell" id="gameBoard">
  <header class="top-bar">
    <div>
      <h1>🧪 Lab Lockdown</h1>
      <p class="subtitle" id="roomTitle"></p>
    </div>
    <div class="stats-container">
      <div class="progress-card">
        <span>Security Level</span>
        <strong id="progressText">1 / 10</strong>
      </div>
      <div class="progress-card">
        <span>Score</span>
        <strong id="scoreText">0</strong>
      </div>
    </div>
  </header>

  <section class="story-card">
    <h2>🔬 Field Observation</h2>
    <p id="observation"></p>
    <p class="question" id="question"></p>
  </section>

  <section class="tube-rack" id="answers"></section>

  <section class="result-card hidden" id="resultCard">
    <h3 id="resultTitle"></h3>
    <p id="resultMessage"></p>
    <button id="nextBtn" class="next-btn hidden">Proceed to Next Chamber 🔓</button>
  </section>
</main>

<main class="game-shell hidden" id="finalScreen">
  <section class="story-card center-text">
    <h1 style="color: #00ffa6; margin-bottom: 10px;">Simulation Complete</h1>
    <h2 id="finalGrade" style="font-size: 2rem;"></h2>
    <p id="finalScoreDisplay" style="font-size: 1.5rem; margin-top: 20px;"></p>
    <button id="restartBtn" class="next-btn" style="margin-top: 30px;">Reboot System 🔁</button>
  </section>
</main>

<script src="questions.js"></script>
<script src="script.js"></script>
</body>
</html>
