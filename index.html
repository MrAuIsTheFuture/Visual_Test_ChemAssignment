<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Chemistry: Lab Detective</title>
<style>
/* 1. DARK LAB THEME */
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: #0f172a; 
    margin: 0; 
    padding: 20px; 
    color: #f8fafc; 
}
.container { 
    max-width: 800px; 
    margin: auto; 
    background: #1e293b; 
    padding: 40px; 
    border-radius: 20px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    border: 1px solid #334155;
}
h1 { color: #38bdf8; text-align: center; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }

/* 2. THE VIRTUAL TEST TUBE */
#lab-bench { display: flex; justify-content: center; margin: 30px 0; }
.test-tube {
    width: 70px; height: 200px; 
    border: 4px solid #94a3b8; 
    border-radius: 0 0 35px 35px; 
    background: rgba(255,255,255,0.05);
    position: relative; overflow: hidden;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.1);
}
.liquid {
    position: absolute; bottom: 0; width: 100%; height: 60%;
    background: #64748b; /* Default grey liquid */
    transition: all 1s ease;
}

/* 3. GAME BUTTONS */
button { 
    background: #0ea5e9; color: white; border: none; 
    padding: 12px 24px; border-radius: 8px; cursor: pointer; 
    font-weight: 600; transition: 0.3s;
}
button:hover { background: #38bdf8; transform: translateY(-2px); }
input[type=text] { 
    width: 90%; padding: 12px; border: 1px solid #334155; 
    border-radius: 8px; background: #0f172a; color: white; margin-bottom: 10px;
}
.option { 
    display: block; width: 100%; margin: 12px 0; padding: 15px; 
    background: #334155; text-align: left; border: 1px solid #475569; 
    border-radius: 10px; color: #f1f5f9; cursor: pointer;
}
.option:hover { background: #475569; border-color: #38bdf8; }

/* 4. FEEDBACK COLORS */
.hidden { display: none; }
.correct { background: #059669 !important; border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16,185,129,0.4); }
.wrong { background: #be123c !important; border-color: #f43f5e !important; }
.theory { 
    background: #0f172a; border-left: 5px solid #38bdf8; 
    padding: 20px; margin-top: 25px; border-radius: 8px; font-style: italic; 
}
#leaderboard { background: #0f172a; padding: 15px; border-radius: 10px; }
</style>
</head>
<body>

<div class="container">
  <h1>Lab Detective</h1>
  <p class="subtitle">Qualitative Organic Analysis</p>

  <div id="startScreen">
    <label><strong>Authorized Personnel Name:</strong></label>
    <input type="text" id="playerName" placeholder="Enter name...">
    <button onclick="startGame()">Access Lab</button>
  </div>

  <div id="quizScreen" class="hidden">
    <p><strong>Detective:</strong> <span id="displayName"></span> | <strong>Case:</strong> <span id="qNum"></span>/<span id="qTotal"></span></p>
    
    <div id="lab-bench">
      <div class="test-tube">
        <div id="liquidColor" class="liquid"></div>
      </div>
    </div>

    <h3 id="questionText"></h3>
    <div id="options"></div>
    <div id="feedback"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Proceed to Next Case</button>
  </div>

  <div id="endScreen" class="hidden">
    <h2>Investigation Complete!</h2>
    <p id="finalScore"></p>
    <h3>Local Crime Lab Records</h3>
    <ol id="leaderboard"></ol>
    <button onclick="restartGame()">New Investigation</button>
  </div>
</div>

<script>
const QUESTION_BANK = [
  {
    q: "A scientist bubbles an unknown alkene into this orange solution. What change occurs?",
    options: ["Orange to colourless", "Turns blue", "Solid precipitate forms", "No change"],
    answer: 0,
    type: "alkene",
    theory: "Alkenes break their double bonds to bond with Bromine, removing the orange color."
  },
  {
    q: "You add Tollens' reagent to a suspect aldehyde. What appears on the glass?",
    options: ["Green sludge", "Silver mirror", "Gas bubbles", "Blue solution"],
    answer: 1,
    type: "silver",
    theory: "Aldehydes reduce silver ions into actual metallic silver, coating the tube."
  },
  {
    q: "Which reagent is used to find a carbonyl group (orange precipitate)?",
    options: ["2,4-DNPH", "Bromine Water", "Sodium Bicarbonate", "Ferric Chloride"],
    answer: 0,
    type: "orange_ppt",
    theory: "2,4-Dinitrophenylhydrazine (DNPH) is the standard test for aldehydes and ketones."
  },
  {
    q: "You add Sodium Bicarbonate to a Carboxylic Acid. What do you hear and see?",
    options: ["The tube gets cold", "Effervescence (bubbles) of CO₂", "A purple flash", "It turns green"],
    answer: 1,
    type: "bubbles",
    theory: "Acid + Carbonate = Salt + Water + Carbon Dioxide gas."
  },
  {
    q: "A drop of Ferric Chloride hits a sample of Phenol. What color is the complex?",
    options: ["Purple/Violet", "Brick-red", "Bright Yellow", "Deep Black"],
    answer: 0,
    type: "phenol",
    theory: "Iron(III) ions react with phenol groups to form a distinct violet complex."
  },
  {
    q: "How do we ensure Ethanol fully oxidises to Ethanoic Acid?",
    options: ["Reflux with acidified dichromate", "Leave it in the sun", "Mix with cold water", "Add salt"],
    answer: 0,
    type: "oxidation",
    theory: "Heating under reflux prevents the volatile intermediate (ethanal) from escaping."
  },
  {
    q: "What color change confirms the dichromate has oxidised the alcohol?",
    options: ["Orange to green", "Red to blue", "Clear to pink", "Yellow to purple"],
    answer: 0,
    type: "oxidation",
    theory: "The orange Dichromate ion is reduced to the green Chromium(III) ion."
  }
];

let selectedQuestions = [];
let current = 0;
let score = 0;
let player = "";

function startGame() {
  player = document.getElementById('playerName').value.trim();
  if (!player) { alert("Access Denied: Enter Name."); return; }
  
  selectedQuestions = [...QUESTION_BANK].sort(() => Math.random() - 0.5).slice(0, 6);
  current = 0; score = 0;
  
  document.getElementById('displayName').textContent = player;
  document.getElementById('qTotal').textContent = selectedQuestions.length;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  const q = selectedQuestions[current];
  document.getElementById('qNum').textContent = current + 1;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('feedback').innerHTML = "";
  document.getElementById('nextBtn').classList.add('hidden');
  
  // RESET LIQUID TO NEUTRAL
  const liquid = document.getElementById('liquidColor');
  liquid.style.background = "#64748b"; 
  liquid.style.height = "60%";

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(idx, btn);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(choice, button) {
  const q = selectedQuestions[current];
  const buttons = document.querySelectorAll('.option');
  const liquid = document.getElementById('liquidColor');
  buttons.forEach(btn => btn.disabled = true);

  if (choice === q.answer) {
    score++;
    button.classList.add('correct');
    
    // TRIGGER VISUAL CHEMICAL REACTION
    if(q.type === "alkene") liquid.style.background = "#f1f5f9"; // Orange fades
    if(q.type === "silver") liquid.style.background = "linear-gradient(to right, #94a3b8, #f1f5f9, #94a3b8)"; // Silver
    if(q.type === "phenol") liquid.style.background = "#7c3aed"; // Purple
    if(q.type === "oxidation") liquid.style.background = "#059669"; // Green
    if(q.type === "orange_ppt") liquid.style.background = "#ea580c"; // Orange
    if(q.type === "bubbles") {
        liquid.style.height = "90%"; // Liquid rises with gas
        liquid.style.background = "#cbd5e1";
    }

  } else {
    button.classList.add('wrong');
    buttons[q.answer].classList.add('correct');
    liquid.style.background = "#450a0a"; // Reaction failed/burnt look
  }

  document.getElementById('feedback').innerHTML = `<div class="theory"><strong>Case File Note:</strong> ${q.theory}</div>`;
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion() {
  current++;
  if (current < selectedQuestions.length) { showQuestion(); } 
  else { endGame(); }
}

function endGame() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = `Detective ${player}, you solved ${score} out of ${selectedQuestions.length} cases correctly.`;
  
  // Simple Leaderboard save
  const board = JSON.parse(localStorage.getItem('labScores') || '[]');
  board.push({name: player, score: score});
  board.sort((a,b) => b.score - a.score);
  localStorage.setItem('labScores', JSON.stringify(board.slice(0,5)));
  
  const list = document.getElementById('leaderboard');
  list.innerHTML = board.slice(0,5).map(e => `<li>${e.name}: ${e.score} cases solved</li>`).join('');
}

function restartGame() {
  location.reload();
}
</script>
</body>
</html>
