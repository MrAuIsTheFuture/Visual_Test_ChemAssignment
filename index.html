<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Lab Lockdown: Mad Science Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-shell" id="introScreen">
        <section class="story-card" style="text-align: center;">
            <h1 style="color: #00ffa6; font-size: 3rem;">🧪 The Mad Lab</h1>
            <p style="font-size: 1.2rem; margin-bottom: 30px;">Trapped in Dr. Beaker's lab! Use your chemistry knowledge to mix the correct reagents and override the security system. One wrong move and... well, let's just say it gets messy.</p>
            <div class="input-group">
                <label for="playerNameInput" style="display:block; margin-bottom:10px;">Scientist Name:</label>
                <input type="text" id="playerNameInput" placeholder="e.g. Professor Fizz" autocomplete="off">
            </div>
            <button id="startBtn" class="next-btn" style="margin-top: 20px;">Put on Goggles & Enter 🥽</button>
        </section>
    </main>

    <main class="game-shell hidden" id="gameBoard">
        <header class="top-bar">
            <div>
                <h1>🔐 Area Secured</h1>
                <p class="subtitle" id="roomTitle"></p>
            </div>
            <div class="stats-container">
                <div class="progress-card"><span>Door</span><strong id="progressText">1 / 10</strong></div>
                <div class="progress-card"><span>Score</span><strong id="scoreText">0</strong></div>
            </div>
        </header>

        <section class="story-card">
            <h2>🔬 Observation Log</h2>
            <p id="observation" style="font-style: italic; color: #bdfaff;"></p>
            <p class="question" id="question"></p>
        </section>

        <section class="tube-rack" id="answers"></section>

        <section class="result-card hidden" id="resultCard">
            <h3 id="resultTitle"></h3>
            <p id="resultMessage"></p>
            <button id="nextBtn" class="next-btn hidden">Rush to Next Room 🏃💨</button>
        </section>
    </main>

    <main class="game-shell hidden" id="finalScreen">
        <section class="story-card center-text">
            <h1 style="color: #00ffa6;">Simulation Survived!</h1>
            <h2 id="finalGrade"></h2>
            <p id="finalScoreDisplay" style="font-size: 1.5rem; margin-top: 20px;"></p>
            <p id="finalNameDisplay" style="color: #9fdfff;"></p>
            <button id="restartBtn" class="next-btn" style="margin-top: 30px;">Reboot System 🔁</button>
        </section>
    </main>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
